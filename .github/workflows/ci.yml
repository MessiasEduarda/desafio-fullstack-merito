name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: desafio_merito
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        working-directory: backend
        run: npm install
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/desafio_merito?schema=public

      - name: Generate Prisma Client
        working-directory: backend
        run: |
          chmod +x node_modules/.bin/prisma
          node_modules/.bin/prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/desafio_merito?schema=public

      - name: Run migrations
        working-directory: backend
        run: node_modules/.bin/prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/desafio_merito?schema=public

      - name: Run tests
        working-directory: backend
        run: |
          chmod +x node_modules/.bin/jest
          node_modules/.bin/jest --runInBand
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/desafio_merito?schema=public
          NODE_ENV: test

  build:
    name: build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t desafio-backend ./backend

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy simulation
        run: echo "Deploy concluído com sucesso!"
