version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: desafio_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: desafio_merito
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: desafio_backend
    ports:
      - '3333:3333'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/desafio_merito?schema=public
      PORT: 3333
    depends_on:
      - db

volumes:
  postgres_data:
